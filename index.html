<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2235;--border:#1f2d45;--text:#f0f4ff;--muted:#5a7099;--dim:#2d3f5c;--a:#3b82f6;--a2:#60a5fa;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--violet:#8b5cf6;--radius:14px;--radius-sm:8px}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#app{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:4px}
.auth-bg{height:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,#1a2a4a 0%,var(--bg) 60%);overflow-y:auto}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;animation:fadeUp .4s ease;margin:auto}
.auth-logo{text-align:center;margin-bottom:8px}.auth-logo img{width:80px;height:80px;object-fit:contain;border-radius:12px}
.auth-brand{text-align:center;font-size:26px;font-weight:800;color:var(--a2);letter-spacing:-1px;margin-bottom:4px}
.auth-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.auth-h{font-size:18px;font-weight:700;margin-bottom:18px;color:var(--text)}
.auth-fields{display:flex;flex-direction:column;gap:13px}
.auth-link{text-align:center;color:var(--muted);font-size:13px;margin-top:14px;cursor:pointer}.auth-link b{color:var(--a2)}
.auth-copy{text-align:center;font-size:10px;color:var(--muted);margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.shell{height:100%;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-logo{font-size:18px;font-weight:800;color:var(--a2);letter-spacing:-0.5px}
.topbar-role{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);background:var(--dim);padding:3px 8px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
.topbar-user{font-size:12px;color:var(--muted);flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-logout{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 2px;flex-shrink:0}
.notif-bell{position:relative;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:0 4px;flex-shrink:0}
.notif-badge{position:absolute;top:-4px;right:-2px;background:var(--red);color:#fff;border-radius:50%;width:17px;height:17px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.body-area{flex:1;display:flex;overflow:hidden}
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent;position:relative}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--a2);background:#3b82f610;border-left-color:var(--a2)}
.nav-badge{background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800;margin-left:auto}
.bottom-nav{display:none;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,6px);flex-shrink:0}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;border-radius:10px;transition:all .15s;position:relative}
.bn-item .bn-icon{font-size:19px}.bn-item.active{color:var(--a2)}
.bn-badge{position:absolute;top:2px;right:8px;background:var(--red);color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}
.page{flex:1;overflow-y:auto;padding:18px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--a);box-shadow:0 0 0 3px #3b82f620}
.field input[readonly]{opacity:.5;cursor:not-allowed}
.field textarea{resize:vertical;min-height:65px}
select option{background:var(--surface)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--a);color:#fff}.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}.btn-warning{background:var(--amber);color:#000}
.btn-ghost{background:var(--dim);color:var(--text)}.btn-violet{background:var(--violet);color:#fff}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}.btn-full{width:100%}
.msg{padding:9px 13px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:4px}
.msg-err{background:#ef444415;border:1px solid #ef444440;color:#ef4444}
.msg-ok{background:#10b98115;border:1px solid #10b98140;color:#10b981}
.msg-info{background:#3b82f615;border:1px solid #3b82f640;color:#60a5fa}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.bk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.bk-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.bk-purpose{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.bk-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px}
.bk-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;background:var(--bg);padding:5px 9px;border-radius:6px}
.bk-reject-reason{font-size:11px;color:var(--red);margin-top:5px;background:#ef444410;padding:5px 9px;border-radius:6px;border:1px solid #ef444430}
.bk-actions{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.badge-blue{background:#3b82f618;color:#60a5fa;border:1px solid #3b82f640}
.badge-amber{background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b40}
.badge-green{background:#10b98118;color:#10b981;border:1px solid #10b98140}
.badge-red{background:#ef444418;color:#ef4444;border:1px solid #ef444440}
.badge-violet{background:#8b5cf618;color:#8b5cf6;border:1px solid #8b5cf640}
.badge-muted{background:var(--dim);color:var(--muted)}
.pill-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.pill{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s}
.pill:hover{border-color:var(--dim);color:var(--text)}.pill.sel{border-color:var(--a);color:var(--a2);background:#3b82f612}
.room-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}.room-cards-4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.room-pick{border:2px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s;background:var(--bg)}
.room-pick.sel-a{border-color:#3b82f6;background:#3b82f610}.room-pick.sel-b{border-color:#f59e0b;background:#f59e0b10}.room-pick.sel-c{border-color:#10b981;background:#10b98110}.room-pick.sel-d{border-color:#8b5cf6;background:#8b5cf610}
.room-pick-name{font-weight:700;font-size:13px;margin-bottom:2px}.room-pick-cap{font-size:10px;color:var(--muted)}
.cal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-weight:800;font-size:14px}
.cal-nav{background:var(--dim);border:none;color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{font-size:9px;font-weight:700;color:var(--muted);text-align:center;padding:3px 0}
.cal-day{border-radius:7px;padding:5px 2px 3px;cursor:pointer;text-align:center;font-size:11px;color:var(--muted);border:1.5px solid transparent;min-height:38px;display:flex;flex-direction:column;align-items:center}
.cal-day:hover{background:var(--dim)}.cal-day.sel{background:#3b82f618;border-color:var(--a);color:var(--a2);font-weight:700}
.cal-day.today{color:var(--amber);font-weight:800}
.dot-row{display:flex;gap:2px;margin-top:2px;justify-content:center}.dot{width:4px;height:4px;border-radius:50%}
.room-day-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px}
.room-day-name{font-weight:700;font-size:12px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.bk-chip{display:flex;flex-wrap:wrap;gap:5px;font-size:11px;color:var(--muted);background:var(--bg);padding:6px 9px;border-radius:7px;margin-top:5px}
.bk-chip-p{color:var(--a2);font-weight:700}
.user-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:8px}
.u-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;color:#fff}
.u-info{flex:1;min-width:0}.u-name{font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.u-un{font-size:10px;color:var(--a2);font-family:'DM Mono',monospace}
.u-ac{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:#00000090;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:420px;animation:fadeUp .2s ease;max-height:90vh;overflow-y:auto;margin:auto}
.modal-title{font-size:17px;font-weight:800;margin-bottom:18px}
.modal-btns{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:30px;font-weight:800;margin-bottom:4px}.stat-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.bar-title{font-size:13px;font-weight:700;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:10px;color:var(--muted);width:75px;flex-shrink:0;text-align:right}
.bar-track{flex:1;background:var(--dim);border-radius:20px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px}.bar-val{font-size:11px;font-weight:700;width:22px;text-align:right;flex-shrink:0}
.notif-panel{position:fixed;top:52px;right:10px;width:300px;background:var(--surface);border:1px solid var(--border);border-radius:14px;z-index:90;box-shadow:0 8px 32px #00000060;max-height:400px;overflow-y:auto;animation:fadeUp .2s ease}
.notif-header{padding:12px 14px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px}
.notif-item.unread{border-left:3px solid var(--a)}.notif-time{font-size:10px;color:var(--muted);margin-top:2px}
.notif-empty{padding:20px;text-align:center;color:var(--muted);font-size:12px}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.settings-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}.toggle-label{font-size:13px;color:var(--text)}.toggle-sub{font-size:10px;color:var(--muted);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--dim);border-radius:20px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--green)}.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s}.toggle.on::after{left:23px}
.sec-title{font-size:13px;font-weight:800;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.sec-cnt{background:var(--a);color:#fff;border-radius:20px;padding:1px 8px;font-size:10px}
.form-grid{display:flex;flex-direction:column;gap:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
.filter-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.f-pill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:600;color:var(--muted)}
.f-pill.active{border-color:var(--a);color:var(--a2);background:#3b82f610}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:36px 20px}
.hint{font-size:10px;color:var(--muted);margin-top:3px}.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);font-size:14px}
.spinner{width:40px;height:40px;border:3px solid var(--dim);border-top:3px solid var(--a);border-radius:50%;animation:spin .8s linear infinite}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:640px){.sidebar{display:none}.bottom-nav{display:block}.page{padding:12px}.room-cards,.row2,.row3{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.notif-panel{right:4px;left:4px;width:auto}}
@media(min-width:641px){.bottom-nav{display:none}.sidebar{display:flex}}
</style>
</head>

// ── FIREBASE LISTENERS (real-time sync) ──
function startListeners(){
  onValue(ref(db,'users'),snap=>{S.users=snap.val()||{};render()});
  onValue(ref(db,'bookings'),snap=>{S.bookings=snap.val()||{};render()});
  onValue(ref(db,'notifs'),snap=>{S.notifs=Object.values(snap.val()||{}).sort((a,b)=>b.ts?.localeCompare(a.ts||'')||0);render()});
  onValue(ref(db,'appSettings'),snap=>{S.appSettings=snap.val()||{gestoreEnabled:true};render()});
}

function usersArr(){return Object.values(S.users)}
function bookingsArr(){return Object.values(S.bookings).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''))}

function unreadCount(){
  if(!S.user)return 0;
  return S.notifs.filter(n=>!n.read&&(n.forRoles?.includes(S.user.role)||n.forRoles?.includes('user_'+S.user.id))).length;
}

async function addNotif(type,msg,forRoles){
  const id=uid();
  await set(ref(db,`notifs/${id}`),{id,type,msg,forRoles,read:false,ts:new Date().toISOString()});
  if('Notification' in window&&Notification.permission==='granted')new Notification('Nu.Ge.S.I.',{body:msg});
}

async function markAllRead(){
  const updates={};
  S.notifs.filter(n=>!n.read&&n.forRoles?.includes(S.user.role)).forEach(n=>{updates[`notifs/${n.id}/read`]=true});
  if(Object.keys(updates).length)await update(ref(db),updates);
}

// ── RENDER ──
function render(){
  const root=document.getElementById('app');
  root.innerHTML=buildHTML();
  bind();
}

function buildHTML(){
  let h=S.user?buildShell():buildAuth();
  if(S.modal)h+=buildModal();
  if(S.showNotif)h+=buildNotifPanel();
  return h;
}

// ── STATS ──
function buildStats(){
  const bks=bookingsArr();
  const tot=bks.length,app=bks.filter(b=>b.status==='approved').length,rej=bks.filter(b=>b.status==='rejected').length,wait=bks.filter(b=>b.status==='waiting').length;
  const byRoom=ROOMS.map(r=>({name:r.name,color:r.color,n:bks.filter(b=>b.roomId===r.id&&b.status==='approved').length}));
  const byPurp=PURPOSES.map(p=>({name:p,n:bks.filter(b=>b.purpose===p&&b.status==='approved').length})).filter(p=>p.n>0).sort((a,b)=>b.n-a.n);
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;months.push({lbl:d.toLocaleDateString('it-IT',{month:'short'}),n:bks.filter(b=>b.date?.startsWith(ym)&&b.status==='approved').length});}
  const maxM=Math.max(...months.map(m=>m.n),1),maxR=Math.max(...byRoom.map(r=>r.n),1),maxP=Math.max(...byPurp.map(p=>p.n),1);
  return`<div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--a2)">${tot}</div><div class="stat-label">Totale</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${app}</div><div class="stat-label">Approvate</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${rej}</div><div class="stat-label">Rifiutate</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--violet)">${wait}</div><div class="stat-label">In attesa</div></div>
  </div>
  <div class="bar-wrap"><div class="bar-title">📅 Ultimi 6 mesi</div>${months.map(m=>`<div class="bar-row"><div class="bar-label">${m.lbl}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.n/maxM*100)}%;background:var(--a)"></div></div><div class="bar-val" style="color:var(--a2)">${m.n}</div></div>`).join('')}</div>
  <div class="bar-wrap"><div class="bar-title">🏛 Per aula</div>${byRoom.map(r=>`<div class="bar-row"><div class="bar-label" style="font-size:9px">${r.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.n/maxR*100)}%;background:${r.color}"></div></div><div class="bar-val" style="color:${r.color}">${r.n}</div></div>`).join('')}</div>
  ${byPurp.length?`<div class="bar-wrap"><div class="bar-title">📋 Per tipo</div>${byPurp.map(p=>`<div class="bar-row"><div class="bar-label">${p.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.n/maxP*100)}%;background:var(--violet)"></div></div><div class="bar-val" style="color:var(--violet)">${p.n}</div></div>`).join('')}</div>`:''}
  <div style="margin-top:16px"><button class="btn btn-ghost btn-full" onclick="printPage('statistiche')">🖨️ Stampa statistiche</button></div>
  </div>`;
}

// ── CALENDARIO ──
function buildCal(){
  const bks=bookingsArr().filter(b=>b.status==='approved');
  const m=S.calMonth,Y=m.getFullYear(),M=m.getMonth(),sel=S.calDate;
  const fd=new Date(Y,M,1).getDay(),dim=new Date(Y,M+1,0).getDate();
  const mn=m.toLocaleDateString('it-IT',{month:'long',year:'numeric'}).toUpperCase();
  const hasBk=d=>{const ds=`${Y}-${String(M+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;return bks.filter(b=>(b.durType==='ore'&&b.date===ds)||(b.durType==='giorni'&&ds>=b.date&&ds<=b.dateTo))};
  let cells='';
  for(let i=0;i<(fd===0?6:fd-1);i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${Y}-${String(M+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const b2=hasBk(d);
    const dots=ROOMS.filter(r=>b2.some(b=>b.roomId===r.id)).map(r=>`<span class="dot" style="background:${r.color}"></span>`).join('');
    cells+=`<div class="cal-day${ds===sel?' sel':''}${ds===today()?' today':''}" onclick="setCalDate('${ds}')">${d}${dots?`<div class="dot-row">${dots}</div>`:''}</div>`;
  }
  const dayBks=bks.filter(b=>(b.durType==='ore'&&b.date===sel)||(b.durType==='giorni'&&sel>=b.date&&sel<=b.dateTo));
  const selFmt=new Date(sel+'T12:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const panels=ROOMS.map(r=>{
    const rb=dayBks.filter(b=>b.roomId===r.id).sort((a,b)=>(a.fromTime||'').localeCompare(b.fromTime||''));
    return`<div class="room-day-card" style="border-left:4px solid ${r.color}">
      <div class="room-day-name" style="color:${r.color}">${r.name}</div>
      ${rb.length?rb.map(b=>`<div class="bk-chip"><span class="bk-chip-p">${b.purpose}</span><span>👤 ${b.userName}</span>${b.durType==='ore'?`<span style="color:${r.color};font-weight:700">⏱ ${b.fromTime}–${b.toTime}</span>`:`<span style="color:var(--amber)">📅 fino al ${fmtD(b.dateTo)}</span>`}${b.battaglione?`<span style="color:var(--muted)">${b.battaglione}</span>`:''}</div>`).join(''):'<div style="font-size:12px;color:var(--green)">✅ Disponibile</div>'}
    </div>`;
  }).join('');
  return`<div class="cal-box">
    <div class="cal-header"><button class="cal-nav" onclick="calPrev()">‹</button><span class="cal-month">${mn}</span><button class="cal-nav" onclick="calNext()">›</button></div>
    <div class="cal-grid">${['L','M','M','G','V','S','D'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}</div>
    <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap">${ROOMS.map(r=>`<span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)"><span style="width:7px;height:7px;border-radius:50%;background:${r.color};display:inline-block"></span>${r.name}</span>`).join('')}</div>
  </div>
  <div style="font-size:14px;font-weight:800;margin-bottom:12px;padding:10px 13px;background:var(--surface);border-radius:9px;border:1px solid var(--border)">📅 ${selFmt}</div>
  ${panels}`;
}

function buildUsers(){
  const all=usersArr();
  const pending=all.filter(u=>!u.approved&&u.role==='user');
  const active=all.filter(u=>u.approved&&!u.blocked&&u.role==='user');
  const blocked=all.filter(u=>u.blocked&&u.role==='user');
  const staff=all.filter(u=>u.role==='admin'||u.role==='gestore');
  const uR=(u,ac)=>`<div class="user-row">
    ${avEl(u,38)}
    <div class="u-info">
      <div class="u-name">${u.name} <span class="badge ${u.role==='admin'?'badge-violet':u.role==='gestore'?'badge-blue':'badge-muted'}">${u.role}</span>${u.blocked?'<span class="badge badge-red">bloccato</span>':''}</div>
      <div class="u-un">@${u.username}</div>
      ${u.battaglione?`<div style="font-size:10px;color:var(--muted)">${u.battaglione}${u.ufficio?' · '+u.ufficio:''}</div>`:''}
      ${u.lastLogin?`<div style="font-size:10px;color:var(--muted)">🕐 ${fmtDT(u.lastLogin)}</div>`:''}
    </div>
    <div class="u-ac">${ac}</div>
  </div>`;
  let html='';
  if(pending.length){html+=`<div class="sec-title">⏳ In attesa <span class="sec-cnt">${pending.length}</span></div>`;html+=pending.map(u=>uR(u,`<button class="btn btn-success btn-sm" onclick="approveU('${u.id}')">✓</button><button class="btn btn-ghost btn-sm" onclick="openEdit('${u.id}')">✏️</button><button class="btn btn-danger btn-sm" onclick="removeU('${u.id}')">🗑</button>`)).join('');}
  html+=`<div class="sec-title" style="margin-top:${pending.length?18:0}px">✅ Attivi <span class="sec-cnt">${active.length}</span></div>`;
  html+=active.length?active.map(u=>uR(u,`<button class="btn btn-ghost btn-sm" onclick="openEdit('${u.id}')">✏️</button><button class="btn btn-warning btn-sm" onclick="blockU('${u.id}')">🔒</button><button class="btn btn-danger btn-sm" onclick="removeU('${u.id}')">🗑</button>`)).join(''):`<div class="empty" style="padding:12px">Nessuno.</div>`;
  if(blocked.length){html+=`<div class="sec-title" style="margin-top:18px">🔒 Bloccati <span class="sec-cnt">${blocked.length}</span></div>`;html+=blocked.map(u=>uR(u,`<button class="btn btn-success btn-sm" onclick="unblockU('${u.id}')">🔓</button><button class="btn btn-ghost btn-sm" onclick="openEdit('${u.id}')">✏️</button><button class="btn btn-danger btn-sm" onclick="removeU('${u.id}')">🗑</button>`)).join('');}
  html+=`<div class="sec-title" style="margin-top:18px">👑 Admin & Gestori <span class="sec-cnt">${staff.length}</span></div>`;
  html+=staff.map(u=>uR(u,`<button class="btn btn-ghost btn-sm" onclick="openEdit('${u.id}')">✏️</button>${u.id!==S.user.id?`<button class="btn btn-danger btn-sm" onclick="removeU('${u.id}')">🗑</button>`:''}`)).join('');
  html+=`<button class="btn btn-violet btn-full" style="margin-top:12px" onclick="openAddAdmin()">➕ Aggiungi Admin / Gestore</button>`;
  return html;
}

// ── BOOKING CARD ──
function bkCard(b,sa){
  const r=ROOMS.find(x=>x.id===b.roomId);
  const ti=b.durType==='ore'?`${b.fromTime}–${b.toTime}`:`${fmtD(b.date)} → ${fmtD(b.dateTo)}`;
  const canAct=sa&&b.status==='waiting'&&(S.user.role==='admin'||S.user.role==='gestore');
  return`<div class="bk-card">
    <div class="bk-top"><span class="badge ${r?.id==='aula-a'?'badge-blue':'badge-amber'}">${r?.name||b.roomId}</span><span class="badge ${SC[b.status]||'badge-muted'}">${SL[b.status]||b.status}</span></div>
    <div class="bk-purpose">${b.purpose}</div>
    <div class="bk-meta"><span>👤 ${b.userName}</span>${b.battaglione?`<span>🪖 ${b.battaglione}</span>`:''}<span>📅 ${b.durType==='ore'?fmtD(b.date):''} ${ti}</span></div>
    ${b.notes?`<div class="bk-note">💬 ${b.notes}</div>`:''}
    ${b.rejectReason?`<div class="bk-reject-reason">❌ Motivo rifiuto: ${b.rejectReason}</div>`:''}
    ${canAct?`<div class="bk-actions"><button class="btn btn-success btn-sm" onclick="actBk('${b.id}','approved')">✓ Approva</button><button class="btn btn-danger btn-sm" onclick="openReject('${b.id}')">✗ Rifiuta</button></div>`:''}
    ${S.user?.role==='admin'?`<div class="bk-actions" style="margin-top:6px"><button class="btn btn-ghost btn-sm" onclick="openEditBk('${b.id}')">✏️ Modifica</button><button class="btn btn-danger btn-sm" onclick="deleteBk('${b.id}')">🗑 Elimina</button></div>`:''}
  </div>`;

// ── BIND ──
function bind(){
  ['au','ap','rn','rc'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>e.key==='Enter'&&doAuth())});
  ['rn','rc'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',()=>{const u=document.getElementById('au');if(u)u.value=makeUN((document.getElementById('rn')?.value||'')+' '+(document.getElementById('rc')?.value||''));})});
  ['an','ac'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',()=>{const u=document.getElementById('au2');if(u)u.value=makeUN((document.getElementById('an')?.value||'')+' '+(document.getElementById('ac')?.value||''));})});
  const en=document.getElementById('en');if(en)en.addEventListener('input',()=>{const u=document.getElementById('eu');if(u)u.value=makeUN(en.value)});
  const pn=document.getElementById('pn');if(pn)pn.addEventListener('input',()=>{const u=document.getElementById('pu');if(u)u.value=makeUN(pn.value)});
}

window.doAuth=async()=>{
  const un=(document.getElementById('au')?.value||'').trim().toLowerCase();
  const pw=(document.getElementById('ap')?.value||'').trim();
  const msg=document.getElementById('am');
  if(S.authMode==='login'){
    const u=usersArr().find(x=>x.username===un&&x.password===pw);
    if(!u)return msg.innerHTML='<div class="msg msg-err">❌ Username o password non validi.</div>';
    if(u.blocked)return msg.innerHTML='<div class="msg msg-err">🔒 Account bloccato.</div>';
    if(!u.approved)return msg.innerHTML='<div class="msg msg-err">⏳ Account non ancora approvato.</div>';
    // Save last login
    await update(ref(db,`users/${u.id}`),{lastLogin:new Date().toISOString()});
    S.user={...u,lastLogin:new Date().toISOString()};render();
  }else{
    const nome=(document.getElementById('rn')?.value||'').trim();
    const cog=(document.getElementById('rc')?.value||'').trim();
    const batt=(document.getElementById('rbatt')?.value||'').trim();
    const uff=(document.getElementById('ruff')?.value||'').trim();
    const tel=(document.getElementById('rtel')?.value||'').trim();
    const telu=(document.getElementById('rtelu')?.value||'').trim();
    if(!nome||!cog||!pw)return msg.innerHTML='<div class="msg msg-err">⚠️ Compila nome, cognome e password.</div>';
    if(!batt)return msg.innerHTML='<div class="msg msg-err">⚠️ Seleziona il battaglione.</div>';
    const uname=makeUN(nome+' '+cog);
    if(usersArr().find(u=>u.username===uname))return msg.innerHTML='<div class="msg msg-err">⚠️ Username già esistente.</div>';
    const id=uid();
    await set(ref(db,`users/${id}`),{id,name:nome+' '+cog,username:uname,password:pw,role:'user',approved:false,blocked:false,avatar:AVATAR_DEFAULT,battaglione:batt,ufficio:uff,tel,telUff:telu,createdAt:new Date().toISOString(),lastLogin:''});
    await addNotif('registration',`🆕 Nuova registrazione: ${nome} ${cog} (@${uname})`,['admin']);
    msg.innerHTML=`<div class="msg msg-ok">✅ Registrato! Username: <b>${uname}</b> — Attendi approvazione.</div>`;
    setTimeout(()=>{S.authMode='login';render()},3000);
  }
};

window.submitBk=async()=>{
  const f=S.form;
  if(f.durType==='ore'&&f.fromTime>=f.toTime){S.newMsg='⚠️ Orario fine deve essere dopo quello di inizio.';S.newOk=false;render();return}
  if(f.durType==='giorni'&&f.dateTo<f.date){S.newMsg='⚠️ Data fine deve essere dopo la data inizio.';S.newOk=false;render();return}
  const r=ROOMS.find(x=>x.id===f.roomId);
  const room=r;
  const bks=bookingsArr();
  const conflict=bks.find(b=>b.roomId===f.roomId&&b.status!=='rejected'&&(f.durType==='ore'?b.durType==='ore'&&b.date===f.date&&b.fromTime<f.toTime&&b.toTime>f.fromTime:b.durType==='giorni'&&b.date<=f.dateTo&&b.dateTo>=f.date));
  if(conflict){S.newMsg='⛔ Aula già occupata in questo periodo.';S.newOk=false;render();return}
  const id=uid();
  const room=ROOMS.find(r=>r.id===f.roomId);
  await set(ref(db,`bookings/${id}`),{id,roomId:f.roomId,purpose:f.purpose,durType:f.durType,date:f.date,dateTo:f.durType==='giorni'?f.dateTo:f.date,fromTime:f.durType==='ore'?f.fromTime:'',toTime:f.durType==='ore'?f.toTime:'',notes:f.notes,status:'waiting',userId:S.user.id,userName:S.user.name,battaglione:S.user.battaglione||'',createdAt:new Date().toISOString()});
  await addNotif('booking',`📋 Nuova prenotazione: ${S.user.name} — ${room?.name} — ${f.purpose} — ${f.date}`,['admin','gestore']);
  // Notify specific user if selected
  if(f.notifyUserId){
    const targetUser=usersArr().find(u=>u.id===f.notifyUserId);
    if(targetUser){
      await addNotif('booking_user',`📋 Prenotazione per te: ${room?.name} — ${f.purpose} — ${f.date}${f.durType==='ore'?' ore '+f.fromTime+'-'+f.toTime:''}`,['user_'+f.notifyUserId]);
    }
  }
  S.newMsg='✅ Prenotazione inserita con successo!';S.newOk=true;
  S.form={roomId:'aula-a',purpose:'VTC',durType:'ore',date:today(),dateTo:today(),fromTime:'09:00',toTime:'10:00',notes:'',pinerolo:'',notifyUserId:''};
  render();
};

window.actBk=async(id,st)=>{
  const bk=bookingsArr().find(b=>b.id===id);if(!bk)return;
  await update(ref(db,`bookings/${id}`),{status:st});
  await addNotif('status',st==='approved'?`✅ Approvata: ${bk.userName} — ${bk.purpose} — ${fmtD(bk.date)}`:`❌ Rifiutata: ${bk.userName}`,['admin','gestore']);
};




window.confirmReject=async(id)=>{
  const reason=(document.getElementById('reject-reason')?.value||'').trim();
  if(!reason)return document.getElementById('rm').innerHTML='<div class="msg msg-err">⚠️ Inserisci una motivazione.</div>';
  const bk=bookingsArr().find(b=>b.id===id);
  await update(ref(db,`bookings/${id}`),{status:'rejected',rejectReason:reason});
  if(bk)await addNotif('reject',`❌ Rifiutata per ${bk.userName}: "${reason}"`,['admin','gestore']);
  S.modal=null;render();
};

window.approveU=async(id)=>{
  const u=usersArr().find(x=>x.id===id);
  await update(ref(db,`users/${id}`),{approved:true});
  if(u)await addNotif('user',`✅ Utente approvato: ${u.name} (@${u.username})`,['admin']);
};
window.blockU=async(id)=>await update(ref(db,`users/${id}`),{blocked:true});
window.unblockU=async(id)=>await update(ref(db,`users/${id}`),{blocked:false});
window.removeU=async(id)=>{
  if(id===S.user.id)return alert('Non puoi eliminare te stesso.');
  if(confirm('Eliminare questo utente?'))await remove(ref(db,`users/${id}`));
};

window.saveProfile=async()=>{
  const name=(document.getElementById('pn')?.value||'').trim();
  const o=(document.getElementById('po')?.value||'').trim();
  const p=(document.getElementById('pp')?.value||'').trim();
  const c=(document.getElementById('pc')?.value||'').trim();
  const msg=document.getElementById('pm');
  if(!name)return msg.innerHTML='<div class="msg msg-err">⚠️ Nome obbligatorio.</div>';
  const nu=makeUN(name);
  if(usersArr().find(u=>u.username===nu&&u.id!==S.user.id))return msg.innerHTML='<div class="msg msg-err">⚠️ Username già in uso.</div>';
  const upd={name,username:nu};
  if(o||p||c){
    if(o!==S.user.password)return msg.innerHTML='<div class="msg msg-err">❌ Password attuale non corretta.</div>';
    if(!p)return msg.innerHTML='<div class="msg msg-err">⚠️ Inserisci la nuova password.</div>';
    if(p!==c)return msg.innerHTML='<div class="msg msg-err">❌ Le password non coincidono.</div>';
    upd.password=p;
  }
  await update(ref(db,`users/${S.user.id}`),upd);
  S.user={...S.user,...upd};
  msg.innerHTML='<div class="msg msg-ok">✅ Profilo aggiornato!</div>';render();
};

window.saveEdit=async(id)=>{
  const name=(document.getElementById('en')?.value||'').trim();
  const pwd=(document.getElementById('ep')?.value||'').trim();
  const msg=document.getElementById('em');
  if(!name)return msg.innerHTML='<div class="msg msg-err">⚠️ Nome obbligatorio.</div>';
  const nu=makeUN(name);
  if(usersArr().find(u=>u.username===nu&&u.id!==id))return msg.innerHTML='<div class="msg msg-err">⚠️ Username già in uso.</div>';
  const upd={name,username:nu};if(pwd)upd.password=pwd;
  await update(ref(db,`users/${id}`),upd);
  S.modal=null;render();
};

window.saveNewAdmin=async()=>{
  const n=(document.getElementById('an')?.value||'').trim();

  const p=(document.getElementById('apw')?.value||'').trim();

  S.modal=null;render();
};

window.openEditBk=id=>{S.modal={type:'editBk',bkId:id};render()};
window.saveEditBk=async(id,durType)=>{
  const date=document.getElementById('eb-date')?.value;
  const notes=document.getElementById('eb-notes')?.value||'';
  const msg=document.getElementById('ebm');
  if(!date)return msg.innerHTML='<div class="msg msg-err">⚠️ Data obbligatoria.</div>';
  const upd={date,dateTo:durType==='giorni'?(document.getElementById('eb-dateto')?.value||date):date,notes};
  if(durType==='ore'){
    const from=document.getElementById('eb-from')?.value;
    const to=document.getElementById('eb-to')?.value;
    if(from>=to)return msg.innerHTML='<div class="msg msg-err">⚠️ Orario fine deve essere dopo quello di inizio.</div>';
    upd.fromTime=from;upd.toTime=to;
  }
  await update(ref(db,`bookings/${id}`),upd);
  await addNotif('edit','✏️ Prenotazione modificata',['admin','gestore']);
  S.modal=null;render();
};
